name: Daily SEO Sync

on:
  schedule:
    - cron: '0 19 * * *'  # 02:00 ICT (UTC+7)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  sync-gsc:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GSC Sync
        run: |
          curl -f -X POST https://${{ secrets.APP_URL }}/api/cron/sync-gsc \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  sync-ga4:
    runs-on: ubuntu-latest
    needs: sync-gsc  # stagger: GA4 runs after GSC to avoid concurrent DB writes
    if: always()     # GA4 sync is independent — run even if GSC fails
    steps:
      - name: Trigger GA4 Sync
        run: |
          curl -f -X POST https://${{ secrets.APP_URL }}/api/cron/sync-ga4 \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
